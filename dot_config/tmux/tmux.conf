# import color
source-file ~/.config/tmux/colors.conf

# change leader
set -g prefix C-x
# set mouse on
set -g mouse on

# keybind
unbind r
bind r source-file ~/.tmux.conf
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# style
set -g status-position top
set -g status-left-length 100
set -g status-style "fg=#{@fg}, bg=default"
set -g status-left "#[bold] #S #[nobold] | "
set -g window-status-current-format "#[fg=#{@accent}, bold]  #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g mode-style "bg=#{@accent}, fg=black"
set -g pane-active-border-style "fg=#{@accent}"
set -g pane-border-style "fg=#{@outline}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
