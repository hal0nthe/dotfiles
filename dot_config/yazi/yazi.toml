# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_hidden = true
show_symlink = true
scrolloff = 8
title_format = "Yazi"

[preview]
tab_size = 2
max_width = 1600
max_height = 1600
cache_dir = ""
image_delay = 10
image_quality = 90
image_filter = "triangle"

[opener]

edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

open = [
    { run = 'xdg-open "$1"', desc = "Open" },
]

play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]

extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract here" },
]

[open]

rules = [
    # Images
    { mime = "image/*", use = [ "open" ] },

    # Videos
    { mime = "video/*", use = [ "play" ] },

    # Audio
    { mime = "audio/*", use = [ "play" ] },

    # Archives
    { mime = "application/zip", use = [ "extract" ] },
    { mime = "application/x-tar", use = [ "extract" ] },
    { mime = "application/x-bzip2", use = [ "extract" ] },
    { mime = "application/x-7z-compressed", use = [ "extract" ] },
    { mime = "application/x-rar", use = [ "extract" ] },

    # Text
    { mime = "text/*", use = [ "edit" ] },

    # JSON
    { mime = "application/json", use = [ "edit" ] },
]

[tasks]
micro_workers = 5
macro_workers = 10
bizarre_retry = 5

[plugin]

prepend_previewers = [
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
]

[input]
cursor_blink = true

[select]
open_title = "Open with"

[which]
sort_by = "key"
sort_sensitive = false
sort_reverse = false

[log]
enabled = false
